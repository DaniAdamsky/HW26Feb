<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital City Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080c18;
    --surface:  #0f1628;
    --card:     #141d35;
    --border:   #1e2d55;
    --accent:   #4f8fff;
    --accent2:  #7c3aed;
    --green:    #22c97a;
    --red:      #f0485a;
    --yellow:   #f5c842;
    --text:     #e8edf8;
    --muted:    #7a8aaa;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 15%, rgba(79,143,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 65% 85%, rgba(124,58,237,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 50%, rgba(79,143,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 500px 350px at 80% 50%, rgba(124,58,237,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.35rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .counters { display: flex; gap: 12px; }

  .counter {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 500;
  }

  .counter.correct { border-color: rgba(34,201,122,0.3); color: var(--green); }
  .counter.wrong   { border-color: rgba(240,72,90,0.3);  color: var(--red);   }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 999px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.5s ease;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .q-text {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: -0.02em;
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .opt-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    animation: slideIn 0.4s cubic-bezier(0.16,1,0.3,1);
  }

  .opt-btn:hover:not(:disabled) {
    background: #1a2545;
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(79,143,255,0.15);
  }

  .opt-btn:disabled { cursor: default; }

  .opt-btn.correct {
    background: rgba(34,201,122,0.12);
    border-color: var(--green);
    color: var(--green);
  }

  .opt-btn.wrong {
    background: rgba(240,72,90,0.12);
    border-color: var(--red);
    color: var(--red);
  }

  .opt-letter {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    flex-shrink: 0;
    transition: all 0.18s ease;
  }

  .opt-btn.correct .opt-letter { background: var(--green); border-color: var(--green); color: #000; }
  .opt-btn.wrong   .opt-letter { background: var(--red);   border-color: var(--red);   color: #fff; }
  .opt-btn:hover:not(:disabled) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }

  .feedback {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    animation: slideIn 0.3s ease;
    margin-bottom: 12px;
  }

  .feedback.correct-fb { border-color: rgba(34,201,122,0.4); }
  .feedback.wrong-fb   { border-color: rgba(240,72,90,0.4);  }

  .fb-msg { font-weight: 500; font-size: 0.95rem; }
  .feedback.correct-fb .fb-msg { color: var(--green); }
  .feedback.wrong-fb   .fb-msg { color: var(--red);   }

  .next-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .next-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  .end-screen {
    text-align: center;
    padding: 60px 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    animation: slideIn 0.5s cubic-bezier(0.16,1,0.3,1);
    position: relative;
    overflow: hidden;
  }

  .end-screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .end-emoji { font-size: 4rem; margin-bottom: 16px; }

  .end-title {
    font-family: 'Syne', sans-serif;
    font-size: 2.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }

  .end-title.win  { color: var(--yellow); }
  .end-title.lose { color: var(--red);    }

  .end-sub {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .play-again {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.15s;
  }

  .play-again:hover { opacity: 0.88; transform: translateY(-2px); }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrapper">

  <div id="game-ui">
    <header>
      <div class="logo">🌍 Capital Quiz</div>
      <div class="counters">
        <div class="counter correct">✔ <span id="score">0</span> / 5</div>
        <div class="counter wrong">✘ <span id="misses">0</span> / 3</div>
      </div>
    </header>

    <div class="progress-track">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-label">Question <span id="q-num">1</span></div>
      <div class="q-text" id="q-text">Loading...</div>
    </div>

    <div class="options" id="options"></div>

    <div class="feedback hidden" id="feedback">
      <span class="fb-msg" id="fb-msg"></span>
      <button class="next-btn" id="next-btn">Next →</button>
    </div>
  </div>

  <div class="end-screen hidden" id="end-screen">
    <div class="end-emoji" id="end-emoji"></div>
    <div class="end-title" id="end-title"></div>
    <div class="end-sub"  id="end-sub"></div>
    <button class="play-again" onclick="initGame()">Play Again</button>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  { q: "What is the capital of France?",       opts: ["Paris","Lyon","Marseille","Nice"],            ans: 1 },
  { q: "What is the capital of Italy?",        opts: ["Milan","Venice","Rome","Naples"],             ans: 3 },
  { q: "What is the capital of Spain?",        opts: ["Barcelona","Seville","Madrid","Valencia"],    ans: 3 },
  { q: "What is the capital of Portugal?",     opts: ["Porto","Lisbon","Faro","Braga"],              ans: 2 },
  { q: "What is the capital of Greece?",       opts: ["Thessaloniki","Athens","Patras","Heraklion"], ans: 2 },
  { q: "What is the capital of Netherlands?",  opts: ["Rotterdam","Utrecht","Eindhoven","Amsterdam"],ans: 4 },
  { q: "What is the capital of Belgium?",      opts: ["Antwerp","Bruges","Brussels","Ghent"],        ans: 3 },
  { q: "What is the capital of Switzerland?",  opts: ["Zurich","Geneva","Basel","Bern"],             ans: 4 },
  { q: "What is the capital of Austria?",      opts: ["Salzburg","Vienna","Graz","Innsbruck"],       ans: 2 },
  { q: "What is the capital of Canada?",       opts: ["Toronto","Vancouver","Ottawa","Montreal"],    ans: 3 },
  { q: "What is the capital of Brazil?",       opts: ["Rio de Janeiro","São Paulo","Brasília","Salvador"], ans: 3 },
  { q: "What is the capital of Japan?",        opts: ["Osaka","Tokyo","Kyoto","Hiroshima"],          ans: 2 },
  { q: "What is the capital of Australia?",    opts: ["Sydney","Melbourne","Canberra","Perth"],      ans: 3 },
  { q: "What is the capital of India?",        opts: ["Mumbai","New Delhi","Bangalore","Chennai"],   ans: 2 },
  { q: "What is the capital of Egypt?",        opts: ["Alexandria","Giza","Cairo","Luxor"],          ans: 3 },
  { q: "What is the capital of Mexico?",       opts: ["Guadalajara","Monterrey","Cancún","Mexico City"], ans: 4 },
  { q: "What is the capital of Argentina?",    opts: ["Córdoba","Rosario","Mendoza","Buenos Aires"], ans: 4 },
  { q: "What is the capital of South Korea?",  opts: ["Busan","Incheon","Seoul","Daegu"],            ans: 3 },
  { q: "What is the capital of Sweden?",       opts: ["Gothenburg","Malmö","Uppsala","Stockholm"],   ans: 4 },
  { q: "What is the capital of Norway?",       opts: ["Bergen","Oslo","Trondheim","Stavanger"],      ans: 2 },
];

const WIN_SCORE  = 5;
const MAX_MISSES = 3;
const LABELS = ["A","B","C","D"];

let questions, score, misses, current, answered, questionsAsked;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initGame() {
  questions      = shuffle(ALL_QUESTIONS);
  score          = 0;
  misses         = 0;
  questionsAsked = 0;

  document.getElementById('score').textContent  = 0;
  document.getElementById('misses').textContent = 0;
  document.getElementById('progress').style.width = '0%';
  document.getElementById('game-ui').classList.remove('hidden');
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('feedback').classList.add('hidden');

  loadQuestion();
}

function loadQuestion() {
  if (!questions.length) { showEnd('lose'); return; }

  current  = questions.shift();
  answered = false;
  questionsAsked++;

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  document.getElementById('q-num').textContent  = questionsAsked;
  document.getElementById('q-text').textContent = current.q;

  const container = document.getElementById('options');
  container.innerHTML = '';

  current.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.style.animationDelay = `${i * 0.06}s`;
    btn.innerHTML = `<span class="opt-letter">${LABELS[i]}</span>${opt}`;
    btn.addEventListener('click', () => handleAnswer(i + 1, btn));
    container.appendChild(btn);
  });

  document.getElementById('feedback').classList.add('hidden');
}

function handleAnswer(choice) {
  if (answered) return;
  answered = true;

  const buttons = document.querySelectorAll('.opt-btn');
  buttons.forEach(b => b.disabled = true);

  const correct = choice === current.ans;

  buttons.forEach((b, i) => {
    if (i + 1 === current.ans) b.classList.add('correct');
    else if (i + 1 === choice) b.classList.add('wrong');
  });

  if (correct) {
    score++;
    document.getElementById('score').textContent = score;
  } else {
    misses++;
    document.getElementById('misses').textContent = misses;
  }

  document.getElementById('progress').style.width = `${(score / WIN_SCORE) * 100}%`;

  const fb    = document.getElementById('feedback');
  const fbMsg = document.getElementById('fb-msg');

  if (correct) {
    fb.className      = 'feedback correct-fb';
    fbMsg.textContent = '✓  Correct!';
  } else {
    fb.className      = 'feedback wrong-fb';
    fbMsg.textContent = `✗  Wrong! The answer was ${current.opts[current.ans - 1]}`;
  }
  fb.classList.remove('hidden');

  if (score >= WIN_SCORE) {
    setTimeout(() => showEnd('win'), 900);
  } else if (misses >= MAX_MISSES) {
    setTimeout(() => showEnd('lose'), 900);
  }
}

document.getElementById('next-btn').addEventListener('click', () => {
  document.getElementById('feedback').classList.add('hidden');
  loadQuestion();
});

function showEnd(result) {
  document.getElementById('game-ui').classList.add('hidden');
  const screen = document.getElementById('end-screen');
  screen.classList.remove('hidden');

  if (result === 'win') {
    document.getElementById('end-emoji').textContent = '🏆';
    document.getElementById('end-title').textContent = 'You Win!';
    document.getElementById('end-title').className   = 'end-title win';
    document.getElementById('end-sub').textContent   =
      `Impressive! You got ${score} correct with only ${misses} mistake${misses !== 1 ? 's' : ''}.`;
  } else {
    document.getElementById('end-emoji').textContent = '💀';
    document.getElementById('end-title').textContent = 'Game Over';
    document.getElementById('end-title').className   = 'end-title lose';
    document.getElementById('end-sub').textContent   =
      `You scored ${score} before making ${MAX_MISSES} mistakes. Better luck next time!`;
  }
}

initGame();
</script>
</body>
</html>
